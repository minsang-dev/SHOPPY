spring:
  application:
    name: shoppy
  profiles:
    active: local

server:
  servlet:
    context-path: /api

# 공통 CORS 설정 (기본값)
app:
  cors:
    allowed-origins:
      - http://localhost:8000
      - http://localhost:5500
      - http://localhost:3000

# kjs start
google:
  cloud:
    vision:
      credentials-path: ${GOOGLE_APPLICATION_CREDENTIALS:}
# kjs end
