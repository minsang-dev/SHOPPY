# OpenVidu CE Platform Services
# This file coordinates all services and custom applications.
# Openvidu Version: 2.32.1

services:

    openvidu-server:
        container_name: openvidu-server
        image: openvidu/openvidu-server:2.32.1
        restart: on-failure
        entrypoint: ['/usr/local/bin/entrypoint.sh']
        ports:
            - "5443:5443"
        volumes:
            - ./openvidu/coturn:/run/secrets/coturn
            - /var/run/docker.sock:/var/run/docker.sock
            - ${OPENVIDU_RECORDING_PATH:-/opt/openvidu/recordings}:${OPENVIDU_RECORDING_PATH:-/opt/openvidu/recordings}
            - ${OPENVIDU_RECORDING_CUSTOM_LAYOUT:-/opt/openvidu/custom-layout}:${OPENVIDU_RECORDING_CUSTOM_LAYOUT:-/opt/openvidu/custom-layout}
            - ${OPENVIDU_CDR_PATH:-/opt/openvidu/cdr}:${OPENVIDU_CDR_PATH:-/opt/openvidu/cdr}
            - /opt/openvidu/owncert:/opt/openvidu/owncert:ro
        env_file:
            - .env
        environment:
            - SERVER_SSL_ENABLED=true
            - SERVER_PORT=5443
            - HTTPS_PORT=443
            - KMS_URIS=["ws://kms:8888/kurento"]
            - DOMAIN_OR_PUBLIC_IP=i14c209.p.ssafy.io
            - WITH_NGINX=true
            - COTURN_IP=i14c209.p.ssafy.io
            - COTURN_PORT=8901
        logging:
            options:
                max-size: "${DOCKER_LOGS_MAX_SIZE:-100M}"
        networks:
            - shoppy-net

    kms:
        container_name: kms
        image: ${KMS_IMAGE:-kurento/kurento-media-server:7.3.0}
        restart: always
        ulimits:
            core: -1
            nofile:
                soft: 65536
                hard: 65536
        volumes:
            - /opt/openvidu/kms-crashes:/opt/openvidu/kms-crashes
            - ${OPENVIDU_RECORDING_PATH:-/opt/openvidu/recordings}:${OPENVIDU_RECORDING_PATH:-/opt/openvidu/recordings}
            - /opt/openvidu/kurento-logs:/opt/openvidu/kurento-logs
        environment:
            - KMS_MIN_PORT=8500
            - KMS_MAX_PORT=8700
            - GST_DEBUG=${KMS_DOCKER_ENV_GST_DEBUG:-}
            - KURENTO_LOG_FILE_SIZE=${KMS_DOCKER_ENV_KURENTO_LOG_FILE_SIZE:-100}
            - KURENTO_LOGS_PATH=/opt/openvidu/kurento-logs
        ports:
            - "8500-8700:8500-8700/udp"
            - "8500-8700:8500-8700/tcp"
        logging:
            options:
                max-size: "${DOCKER_LOGS_MAX_SIZE:-100M}"
        networks:
            - shoppy-net

    coturn:
        container_name: coturn
        image: openvidu/openvidu-coturn:2.32.1
        restart: on-failure
        ports:
            - "8901:8901/tcp"
            - "8901:8901/udp"
            - "8701-8900:8701-8900/tcp"
            - "8701-8900:8701-8900/udp"
        env_file:
            - .env
        volumes:
            - ./openvidu/coturn:/run/secrets/coturn
        command:
            - --log-file=stdout
            - --listening-port=8901
            - --fingerprint
            - --min-port=8701
            - --max-port=8900
            - --realm=openvidu
            - --verbose
            - --use-auth-secret
            - --static-auth-secret=$${COTURN_SHARED_SECRET_KEY}
        logging:
            options:
                max-size: "${DOCKER_LOGS_MAX_SIZE:-100M}"
        networks:
            - shoppy-net

    shoppy-be-app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: shoppy-be
        image: shoppy-be
        ports:
            - "8090:8080"
        env_file:
            - .env
        environment:
            - SERVER_PORT=8080
            - SERVER_SSL_ENABLED=false
            - OPENVIDU_URL=https://openvidu-server:5443
            - OPENVIDU_PUBLIC_URL=https://i14c209.p.ssafy.io/openvidu
            - OPENVIDU_SECRET=${OPENVIDU_SECRET}
            - SPRING_APPLICATION_NAME=shoppy-be
            # === MySQL Connection ===
            - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:${DB_PORT}/Shoppy_DB?useSSL=false&allowPublicKeyRetrieval=true
            - SPRING_DATASOURCE_USERNAME=${DB_USER}
            - SPRING_DATASOURCE_PASSWORD=${DB_PASS}
            - SPRING_JPA_DATABASE-PLATFORM=org.hibernate.dialect.MySQLDialect
            - JWT_SECRET=${JWT_SECRET}
            - JWT_ACCESS_EXP=${JWT_ACCESS_EXP}
            - JWT_REFRESH_EXP=${JWT_REFRESH_EXP}
        volumes:
            - /opt/openvidu/owncert:/opt/openvidu/owncert:ro
        logging:
            options:
                max-size: "100M"
        networks:
            - shoppy-net

networks:
    shoppy-net:
        external: true