# 호스트 Nginx 설정 (EC2 /etc/nginx/sites-available/default 대체용)

# 1) HTTP -> HTTPS 리다이렉트
server {
    listen 80;
    listen [::]:80;
    server_name i14c209.p.ssafy.io;
    return 301 https://$host$request_uri;
}

# 2) 443 HTTPS 서버
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name i14c209.p.ssafy.io;

    ssl_certificate     /etc/letsencrypt/live/i14c209.p.ssafy.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/i14c209.p.ssafy.io/privkey.pem;

    # Jenkins용 웹훅
    location /multibranch-webhook-trigger/ {
        proxy_pass http://127.0.0.1:9090/multibranch-webhook-trigger/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 백엔드 API
    location /api {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # OpenVidu 프록시 (외부 443 -> 내부 5443)
    location /openvidu/ {
    proxy_pass https://127.0.0.1:5443/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_ssl_verify off;
    # 추가: 타임아웃 방지
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
}

    # 프론트엔드
    location / {
        proxy_pass http://127.0.0.1:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
