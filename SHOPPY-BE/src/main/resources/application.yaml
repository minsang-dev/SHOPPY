spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO}
    show-sql: ${JPA_SHOW_SQL}

  cloud:
    aws:
      region:
        static: ap-northeast-2
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}
      s3:
        bucket: ${AWS_S3_BUCKET}

server:
  servlet:
    context-path: /api

openvidu:
  url: ${OPENVIDU_URL}
  secret: ${OPENVIDU_SECRET}

webrtc:
  session-id-prefix: room-
  default-max-participants: ${WEBRTC_MAX_USERS:4}
  ice-servers:
    - urls:
        - stun:stun.l.google.com:19302

kakao:
  client-id: ${KAKAO_CLIENT_ID}
  client-secret: ${KAKAO_CLIENT_SECRET}
  redirect-uri: ${KAKAO_REDIRECT_URI}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_EXP}
  refresh-token-expiration: ${JWT_REFRESH_EXP}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}