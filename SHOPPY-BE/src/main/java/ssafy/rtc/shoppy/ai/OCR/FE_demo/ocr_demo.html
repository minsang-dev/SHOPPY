<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OCR Demo</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --muted: #94a3b8;
      --accent: #22c55e;
      --text: #e2e8f0;
      --border: #1f2937;
    }
    body {
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: radial-gradient(1200px 600px at 20% 0%, #1e293b 0%, #0f172a 55%, #0b1120 100%);
      color: var(--text);
      margin: 0;
      padding: 24px;
    }
    .container {
      max-width: 860px;
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin: 10px 0 6px;
    }
    input, button, textarea {
      width: 100%;
      background: #0b1220;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      cursor: pointer;
      background: linear-gradient(180deg, #22c55e, #16a34a);
      border: none;
      color: #052e16;
      font-weight: 700;
      margin-top: 12px;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #0b1220;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      min-height: 120px;
    }
    .hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>OCR Demo</h1>

    <div class="card">
      <div class="row">
        <div>
          <label>Base URL</label>
          <input id="baseUrl" value="http://localhost:8080" />
        </div>
        <div>
          <label>Room ID</label>
          <input id="roomId" value="1" />
        </div>
      </div>
      <div class="row">
        <div>
          <label>Token (옵션)</label>
          <input id="token" placeholder="Bearer 토큰" />
        </div>
        <div>
          <label>이미지 파일</label>
          <input id="file" type="file" accept="image/*" />
        </div>
      </div>
      <button id="uploadBtn">Upload + OCR</button>
      <div class="hint">업로드 후 receipt_id로 OCR 분석 결과 조회까지 진행합니다.</div>
    </div>

    <div class="card">
      <label>Upload Response</label>
      <pre id="uploadResult">{}</pre>
      <label>Analysis Response</label>
      <pre id="analysisResult">{}</pre>
    </div>
  </div>

  <script>
    const uploadBtn = document.getElementById("uploadBtn");
    const uploadResult = document.getElementById("uploadResult");
    const analysisResult = document.getElementById("analysisResult");

    function setJson(el, data) {
      el.textContent = JSON.stringify(data, null, 2);
    }

    uploadBtn.addEventListener("click", async () => {
      const baseUrl = document.getElementById("baseUrl").value.trim();
      const roomId = document.getElementById("roomId").value.trim();
      const token = document.getElementById("token").value.trim();
      const fileInput = document.getElementById("file");

      if (!fileInput.files || fileInput.files.length === 0) {
        alert("이미지 파일을 선택하세요.");
        return;
      }

      const file = fileInput.files[0];
      const form = new FormData();
      form.append("file", file);

      const headers = {};
      if (token) {
        headers["Authorization"] = "Bearer " + token;
      }

      uploadResult.textContent = "Uploading...";
      analysisResult.textContent = "";

      try {
        const uploadRes = await fetch(`${baseUrl}/api/rooms/${roomId}/settlements/receipt`, {
          method: "POST",
          headers,
          body: form
        });
        const uploadJson = await uploadRes.json();
        setJson(uploadResult, uploadJson);

        const receiptId = uploadJson?.data?.receipt_id;
        if (!receiptId) {
          analysisResult.textContent = "receipt_id가 없습니다.";
          return;
        }

        const analysisRes = await fetch(`${baseUrl}/api/ai/ocr/receipts/${receiptId}/analysis`, {
          method: "GET",
          headers
        });
        const analysisJson = await analysisRes.json();
        setJson(analysisResult, analysisJson);
      } catch (err) {
        uploadResult.textContent = "요청 실패: " + err.message;
      }
    });
  </script>
</body>
</html>
