server {
    listen 3000;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # React/Vue 라우팅을 위해 파일이 없으면 index.html로 보냄
        try_files $uri $uri/ /index.html;
    }

    # 기존의 location /api 프록시 설정은 삭제
    # FE 내부 localhost:8090 연결 시도로 인한 502 에러를 방지
}